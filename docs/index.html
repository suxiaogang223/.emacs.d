<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kanso Emacs - Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="A minimalist Emacs configuration tailored for software engineering.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Theme: Simple (Light/Dark auto-switching based on OS preference) -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <link rel="stylesheet" media="(prefers-color-scheme: dark)" href="//cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">

  <!-- Kanso Emacs Custom Styling -->
  <style>
    :root {
      /* Kanso Green */
      --theme-color: #4a7c59;
      --heading-color: #2d4a36;
      --theme-hue: 138;
      --theme-saturation: 25%;
      --theme-lightness: 39%;
      
      /* Docsify-themeable overrides */
      --sidebar-width: 20rem;
      --sidebar-name-margin: 1.5rem 0;
      --sidebar-nav-link-color--active: var(--theme-color);
      --sidebar-nav-link-font-weight--active: bold;
      --blockquote-border-color: var(--theme-color);
      --blockquote-background: #f0f5f1;
    }

    /* Dark Mode Overrides */
    @media (prefers-color-scheme: dark) {
      :root {
        --theme-color: #5a9c6c;
        --heading-color: #e0e0e0;
        --blockquote-background: #222222;
        --blockquote-border-color: #5a9c6c;
        --sidebar-nav-link-color--active: var(--theme-color);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    /* Adjust SVG Logo size in sidebar */
    .sidebar .app-name-link img {
      width: 100%;
      max-width: 200px;
    }

    /* Content Styling */
    .markdown-section {
      max-width: 800px;
    }
    
    .markdown-section code {
      font-family: "Fira Code", "JetBrains Mono", Monaco, Consolas, monospace;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="app">Loading Kanso...</div>
  <script>
    window.$docsify = {
      name: 'Kanso Emacs',
      nameLink: '/',
      logo: 'assets/kanso-logo.svg',
      repo: 'suxiaogang223/kanso-emacs',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      themeColor: '#4a7c59',
      executeScript: true,
      formatUpdated: '{MM}/{DD} {HH}:{mm}',
      homepage: 'index.md',
    }
  </script>
  <!-- Docsify Core -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- docsify-themeable -->
  <script src="//cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>

  <!-- Syntax Highlighting Plugins -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-elisp.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-rust.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-c.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-cpp.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-scheme.min.js"></script>
  
  <!-- Copy to clipboard plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
</body>
</html>
